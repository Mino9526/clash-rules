name: Publish Rules

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish to Release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest --title "Latest" --files *.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
